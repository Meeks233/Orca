name: yt-dlp Update

# Agile release: poll yt-dlp's *stable* channel daily; when a new stable tag
# lands, rebuild + publish the Docker image and record the version so every
# other build (docker, Android APK) tracks the same pinned yt-dlp.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Never let two update runs race on the YTDLP_VERSION commit/push.
concurrency:
  group: ytdlp-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/whale" >> "$GITHUB_OUTPUT"

      - name: Determine versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current="$(cat YTDLP_VERSION)"
          latest="$(gh api repos/yt-dlp/yt-dlp/releases/latest --jq '.tag_name')"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            YTDLP_VERSION=${{ steps.check.outputs.latest }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:ytdlp-${{ steps.check.outputs.latest }}

      - name: Commit bumped YTDLP_VERSION
        if: steps.check.outputs.changed == 'true'
        env:
          # Pass the tag via env (not inline ${{ }}) so it can't break out of the
          # shell command — it's the single source of truth every build pins to.
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          printf '%s\n' "$LATEST" > YTDLP_VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add YTDLP_VERSION
          git commit -m "chore: bump yt-dlp to $LATEST"
          git push

      - name: Summary
        if: always()
        env:
          CURRENT: ${{ steps.check.outputs.current }}
          LATEST: ${{ steps.check.outputs.latest }}
          CHANGED: ${{ steps.check.outputs.changed }}
        run: |
          if [ "$CHANGED" = "true" ]; then
            echo "⬆️ yt-dlp **$CURRENT → $LATEST** — rebuilt & pushed Docker image." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ yt-dlp already up to date at **$CURRENT**." >> "$GITHUB_STEP_SUMMARY"
          fi
